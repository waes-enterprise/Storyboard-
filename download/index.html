<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storyboard AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0A0A0C;--sidebar-bg:#111114;--card-bg:#161619;--card-hover:#1C1C20;
  --border:#2A2A2E;--accent:#E8C547;--accent-dim:#B8982E;--accent-glow:rgba(232,197,71,.12);
  --text:#F0EDE8;--text-dim:#8A8A8E;--text-muted:#5A5A5E;
  --danger:#E85454;--success:#4ADE80;--info:#60A5FA;
  --radius:8px;--radius-lg:12px;--font-display:'DM Serif Display',serif;
  --font-mono:'IBM Plex Mono',monospace;--sidebar-w:340px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-mono);font-size:14px}
input,textarea,select,button{font-family:var(--font-mono);font-size:inherit}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ═══════ LAYOUT ═══════ */
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--sidebar-bg);
  border-right:1px solid var(--border);display:flex;flex-direction:column;
  overflow-y:auto;padding:24px 20px;gap:20px;z-index:10;
}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ═══════ SIDEBAR ═══════ */
.brand{display:flex;align-items:center;gap:10px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.brand-icon{
  width:36px;height:36px;border-radius:var(--radius);background:var(--accent);
  display:flex;align-items:center;justify-content:center;font-size:18px;
}
.brand h1{font-family:var(--font-display);font-size:22px;color:var(--accent);line-height:1}
.brand span{font-size:11px;color:var(--text-muted);display:block;margin-top:2px;letter-spacing:.5px}

.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);font-weight:600}
.field textarea,.field input,.field select{
  background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);
  padding:10px 12px;color:var(--text);outline:none;transition:border .2s;
  resize:vertical;
}
.field textarea:focus,.field input:focus,.field select:focus{border-color:var(--accent)}
.field textarea{min-height:80px;line-height:1.5}
.field input::placeholder,.field textarea::placeholder{color:var(--text-muted)}

.row{display:flex;gap:10px}
.row .field{flex:1}

.style-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.style-btn{
  padding:8px 4px;border:1px solid var(--border);border-radius:var(--radius);
  background:var(--bg);color:var(--text-dim);cursor:pointer;text-align:center;
  font-size:11px;transition:all .2s;
}
.style-btn:hover{border-color:var(--accent-dim);color:var(--text)}
.style-btn.active{border-color:var(--accent);background:var(--accent-glow);color:var(--accent)}

.shot-slider{display:flex;align-items:center;gap:12px}
.shot-slider input[type=range]{
  flex:1;-webkit-appearance:none;height:4px;background:var(--border);
  border:none;border-radius:2px;padding:0;outline:none;
}
.shot-slider input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:16px;height:16px;border-radius:50%;
  background:var(--accent);cursor:pointer;
}
.shot-slider .val{
  min-width:24px;text-align:center;font-weight:600;color:var(--accent);
  font-size:16px;
}

#api-section{border-top:1px solid var(--border);padding-top:16px}
#api-section summary{
  cursor:pointer;font-size:12px;color:var(--text-dim);
  display:flex;align-items:center;gap:6px;list-style:none;
}
#api-section summary::before{content:'';display:inline-block;width:0;height:0;border-left:5px solid var(--text-muted);border-top:4px solid transparent;border-bottom:4px solid transparent;transition:transform .2s}
#api-section[open] summary::before{transform:rotate(90deg)}
.api-note{font-size:10px;color:var(--text-muted);line-height:1.4;margin-top:6px}

.btn{
  padding:12px 16px;border-radius:var(--radius);border:none;cursor:pointer;
  font-weight:600;font-size:13px;transition:all .2s;display:flex;align-items:center;
  justify-content:center;gap:8px;
}
.btn-primary{background:var(--accent);color:#0A0A0C}
.btn-primary:hover{background:#F0D060;transform:translateY(-1px)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text-dim)}
.btn-ghost:hover{border-color:var(--text-dim);color:var(--text)}
.btn-sm{padding:6px 10px;font-size:11px}
.btn-danger{color:var(--danger);border-color:rgba(232,84,84,.3)}
.btn-danger:hover{background:rgba(232,84,84,.1);border-color:var(--danger)}

.actions-row{display:flex;gap:8px;flex-wrap:wrap}
.spacer{flex:1}

/* ═══════ MAIN AREA ═══════ */
#toolbar{
  display:flex;align-items:center;padding:16px 24px;gap:12px;
  border-bottom:1px solid var(--border);min-height:56px;
}
#toolbar h2{font-family:var(--font-display);font-size:18px;color:var(--text);white-space:nowrap}

#canvas{
  flex:1;overflow-y:auto;padding:24px;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));
  gap:20px;align-content:start;
}
#canvas.empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:var(--text-muted);
}
#canvas.empty .empty-icon{font-size:48px;margin-bottom:16px;opacity:.3}
#canvas.empty p{font-size:14px;text-align:center;max-width:300px;line-height:1.6}

/* ═══════ SHOT CARD ═══════ */
.shot-card{
  background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius-lg);
  overflow:hidden;cursor:grab;transition:all .25s;position:relative;
}
.shot-card:hover{border-color:var(--accent-dim);background:var(--card-hover)}
.shot-card.dragging{opacity:.4;transform:scale(.97)}
.shot-card.drag-over{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-glow)}

.shot-header{
  display:flex;align-items:center;padding:10px 14px;gap:8px;
  background:rgba(0,0,0,.3);border-bottom:1px solid var(--border);
}
.shot-badge{
  background:var(--accent);color:#0A0A0C;padding:2px 8px;border-radius:4px;
  font-size:11px;font-weight:700;letter-spacing:.5px;
}
.shot-type{
  color:var(--text-dim);font-size:11px;font-weight:500;
}
.shot-header-actions{margin-left:auto;display:flex;gap:4px}
.shot-header-actions button{
  width:28px;height:28px;border:none;border-radius:6px;
  background:transparent;color:var(--text-muted);cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
  font-size:14px;
}
.shot-header-actions button:hover{background:rgba(255,255,255,.08);color:var(--text)}
.shot-header-actions button.del-btn:hover{color:var(--danger);background:rgba(232,84,84,.1)}

.shot-image{
  width:100%;aspect-ratio:16/9;background:#0D0D10;position:relative;overflow:hidden;
}
.shot-image img{width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .5s}
.shot-image img.loaded{opacity:1}
.shot-image .skeleton{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  color:var(--text-muted);font-size:11px;
}
.shot-image .skeleton.hidden{display:none}
.shot-image .skeleton::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
  background:var(--accent);animation:loading 1.5s ease-in-out infinite;
}
@keyframes loading{0%{width:0;opacity:1}50%{width:70%;opacity:.6}100%{width:100%;opacity:0}}

.shot-body{padding:14px;display:flex;flex-direction:column;gap:8px}
.shot-body p{font-size:12px;line-height:1.5;color:var(--text-dim)}
.shot-body .cam-note{
  font-size:11px;color:var(--accent-dim);font-style:italic;
  padding-left:10px;border-left:2px solid var(--accent-dim);
}

/* ═══════ MODAL ═══════ */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;
  display:flex;align-items:center;justify-content:center;padding:20px;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal{
  background:var(--sidebar-bg);border:1px solid var(--border);border-radius:var(--radius-lg);
  width:100%;max-width:560px;max-height:80vh;overflow-y:auto;padding:28px;
}
.modal h3{font-family:var(--font-display);font-size:22px;margin-bottom:20px;color:var(--accent)}
.modal .field{margin-bottom:14px}
.modal .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* ═══════ TOAST ═══════ */
#toasts{
  position:fixed;bottom:24px;right:24px;z-index:200;display:flex;
  flex-direction:column;gap:8px;pointer-events:none;
}
.toast{
  padding:12px 18px;border-radius:var(--radius);font-size:12px;
  font-weight:500;pointer-events:auto;animation:slideIn .3s ease;
  max-width:360px;border:1px solid;
}
.toast.error{background:rgba(232,84,84,.12);border-color:rgba(232,84,84,.3);color:var(--danger)}
.toast.success{background:rgba(74,222,128,.1);border-color:rgba(74,222,128,.25);color:var(--success)}
.toast.info{background:rgba(96,165,250,.1);border-color:rgba(96,165,250,.25);color:var(--info)}
@keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}

/* ═══════ EXPORT DROPDOWN ═══════ */
.export-dropdown{
  position:relative;display:inline-block;
}
.export-menu{
  position:absolute;top:100%;right:0;margin-top:6px;
  background:var(--sidebar-bg);border:1px solid var(--border);border-radius:var(--radius);
  min-width:150px;padding:4px;z-index:50;
  opacity:0;pointer-events:none;transform:translateY(-4px);transition:all .15s;
}
.export-menu.open{opacity:1;pointer-events:auto;transform:translateY(0)}
.export-menu button{
  display:flex;width:100%;padding:8px 12px;border:none;background:transparent;
  color:var(--text-dim);cursor:pointer;border-radius:4px;text-align:left;
  font-size:12px;gap:8px;transition:background .1s;
}
.export-menu button:hover{background:rgba(255,255,255,.06);color:var(--text)}

/* ═══════ MOBILE ═══════ */
#sidebar-toggle{
  display:none;position:fixed;top:12px;left:12px;z-index:20;
  width:40px;height:40px;border-radius:var(--radius);border:1px solid var(--border);
  background:var(--sidebar-bg);color:var(--text);cursor:pointer;
  font-size:18px;
}
@media(max-width:800px){
  #sidebar-toggle{display:flex;align-items:center;justify-content:center}
  #sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);transition:transform .3s;z-index:15}
  #sidebar.open{transform:translateX(0)}
  #canvas{grid-template-columns:1fr;padding:16px;padding-top:60px}
  #toolbar{padding:16px;padding-top:60px}
}
</style>
</head>
<body>

<button id="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')" aria-label="Toggle sidebar">&#9776;</button>

<div id="app">
  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="brand">
      <div class="brand-icon">&#127916;</div>
      <div>
        <h1>Storyboard AI</h1>
        <span>CINEMATIC SHOT PLANNER</span>
      </div>
    </div>

    <div class="field">
      <label>Scene Description</label>
      <textarea id="scene" placeholder="Describe your scene... e.g. 'A detective enters a dimly lit office, finds a hidden letter on the desk'"></textarea>
    </div>

    <div class="field">
      <label>Visual Style</label>
      <div class="style-grid">
        <button class="style-btn active" data-style="Cinematic">Cinematic</button>
        <button class="style-btn" data-style="Drama">Drama</button>
        <button class="style-btn" data-style="Music Video">Music Video</button>
        <button class="style-btn" data-style="Noir">Noir</button>
        <button class="style-btn" data-style="Action">Action</button>
        <button class="style-btn" data-style="Horror">Horror</button>
      </div>
    </div>

    <div class="field">
      <label>Shot Count</label>
      <div class="shot-slider">
        <input type="range" id="shot-count" min="4" max="16" value="8">
        <span class="val" id="shot-val">8</span>
      </div>
    </div>

    <button class="btn btn-primary" id="generate-btn" onclick="generate()">
      &#9654; Generate Storyboard
    </button>

    <div class="actions-row">
      <button class="btn btn-ghost btn-sm" onclick="clearAll()">Clear</button>
      <span class="spacer"></span>
      <div class="export-dropdown">
        <button class="btn btn-ghost btn-sm" onclick="toggleExportMenu()">&#8681; Export</button>
        <div class="export-menu" id="export-menu">
          <button onclick="exportPNG()">&#128247; PNG</button>
          <button onclick="exportPDF()">&#128196; PDF</button>
          <button onclick="exportCSV()">&#128190; CSV</button>
        </div>
      </div>
    </div>

    <details id="api-section">
      <summary>API Configuration</summary>
      <div class="field" style="margin-top:10px">
        <label>Anthropic API Key</label>
        <input type="password" id="api-key" placeholder="sk-ant-..." autocomplete="off">
        <div class="api-note">Key is stored in your browser only (localStorage). Never sent to any server except Anthropic.</div>
      </div>
    </details>
  </aside>

  <!-- MAIN -->
  <div id="main">
    <div id="toolbar">
      <h2 id="project-title">Untitled Project</h2>
      <span style="color:var(--text-muted);font-size:12px" id="shot-count-label"></span>
    </div>
    <div id="canvas" class="empty">
      <div class="empty-icon">&#127902;</div>
      <p>Describe your scene, pick a style, and hit <strong>Generate Storyboard</strong> to create your cinematic shot list.</p>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3>Edit Shot <span id="edit-shot-id"></span></h3>
    <div class="field">
      <label>Shot Type</label>
      <select id="edit-type">
        <option value="LS">LS — Long Shot</option>
        <option value="MS">MS — Medium Shot</option>
        <option value="MCU">MCU — Medium Close-Up</option>
        <option value="CU">CU — Close-Up</option>
        <option value="OTS">OTS — Over the Shoulder</option>
        <option value="POV">POV — Point of View</option>
        <option value="HA">HA — High Angle</option>
        <option value="LA">LA — Low Angle</option>
        <option value="TI">TI — Tracking Shot</option>
        <option value="WS">WS — Wide Shot</option>
      </select>
    </div>
    <div class="field">
      <label>Action Description</label>
      <textarea id="edit-action" rows="3"></textarea>
    </div>
    <div class="field">
      <label>Camera Note</label>
      <input id="edit-camera" placeholder="e.g. Slow dolly in">
    </div>
    <div class="field">
      <label>Frame Description (for image generation)</label>
      <textarea id="edit-frame" rows="3"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeEditModal()">Cancel</button>
      <button class="btn btn-ghost" onclick="regenerateFromModal()">&#128260; Regenerate Image</button>
      <button class="btn btn-primary" onclick="saveEditModal()">Save</button>
    </div>
  </div>
</div>

<!-- TOASTS -->
<div id="toasts"></div>

<script>
/* ═══════ STATE ═══════ */
let shots = [];
let currentStyle = 'Cinematic';
let editingIndex = -1;
let dragSrcIndex = -1;
let generating = false;

/* ═══════ INIT ═══════ */
document.addEventListener('DOMContentLoaded', () => {
  // Load saved state
  const saved = localStorage.getItem('storyboard-shots');
  if (saved) {
    try { shots = JSON.parse(saved); } catch(e) {}
  }
  const savedKey = localStorage.getItem('storyboard-api-key');
  if (savedKey) document.getElementById('api-key').value = savedKey;
  const savedScene = localStorage.getItem('storyboard-scene');
  if (savedScene) document.getElementById('scene').value = savedScene;
  const savedStyle = localStorage.getItem('storyboard-style');
  if (savedStyle) {
    currentStyle = savedStyle;
    document.querySelectorAll('.style-btn').forEach(b => b.classList.toggle('active', b.dataset.style === currentStyle));
  }
  const savedCount = localStorage.getItem('storyboard-count');
  if (savedCount) {
    document.getElementById('shot-count').value = savedCount;
    document.getElementById('shot-val').textContent = savedCount;
  }

  // Shot count slider
  const slider = document.getElementById('shot-count');
  const valLabel = document.getElementById('shot-val');
  slider.addEventListener('input', () => {
    valLabel.textContent = slider.value;
    localStorage.setItem('storyboard-count', slider.value);
  });

  // Style buttons
  document.querySelectorAll('.style-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentStyle = btn.dataset.style;
      localStorage.setItem('storyboard-style', currentStyle);
    });
  });

  // Save API key on change
  document.getElementById('api-key').addEventListener('input', (e) => {
    localStorage.setItem('storyboard-api-key', e.target.value);
  });

  // Save scene on change
  document.getElementById('scene').addEventListener('input', (e) => {
    localStorage.setItem('storyboard-scene', e.target.value);
  });

  // Close modal on overlay click
  document.getElementById('edit-modal').addEventListener('click', (e) => {
    if (e.target.id === 'edit-modal') closeEditModal();
  });

  // Close export menu on outside click
  document.addEventListener('click', (e) => {
    const menu = document.getElementById('export-menu');
    if (menu.classList.contains('open') && !e.target.closest('.export-dropdown')) {
      menu.classList.remove('open');
    }
  });

  renderCards();
});

/* ═══════ TOAST ═══════ */
function toast(msg, type = 'info') {
  const container = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 4000);
}

/* ═══════ SAVE STATE ═══════ */
function saveState() {
  localStorage.setItem('storyboard-shots', JSON.stringify(shots));
}

/* ═══════ GENERATE ═══════ */
async function generate() {
  const scene = document.getElementById('scene').value.trim();
  if (!scene) { toast('Please describe your scene first.', 'error'); return; }

  const apiKey = document.getElementById('api-key').value.trim();
  if (!apiKey) { toast('Please enter your Anthropic API key in the settings below.', 'error'); return; }

  if (generating) return;
  generating = true;

  const shotCount = document.getElementById('shot-count').value;
  const btn = document.getElementById('generate-btn');
  btn.disabled = true;
  btn.innerHTML = '&#9203; Generating...';

  const prompt = `Create a ${currentStyle.toLowerCase()} style storyboard with ${shotCount} shots for the following scene:\n\n${scene}\n\nApply real film grammar and cinematic language. Make each shot visually distinct and narrative-driven.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4096,
        system: 'You are an autonomous film director and cinematographer. Return ONLY a valid JSON array of shots. Each shot must have: shot_number (integer), shot_type (one of: LS, MS, MCU, CU, OTS, POV, HA, LA, TI, WS), action_description (string, 1-2 sentences describing what happens), camera_note (string, brief camera movement or technique), frame_description (string, detailed visual description for generating a storyboard frame image). Use real film grammar. Ensure shot numbers are sequential starting from 1.',
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!response.ok) {
      const errData = await response.json().catch(() => ({}));
      const errMsg = errData?.error?.message || `API returned ${response.status}`;
      throw new Error(errMsg);
    }

    const data = await response.json();
    let text = data.content?.[0]?.text || '';

    // Extract JSON array from response
    const jsonMatch = text.match(/\[[\s\S]*\]/);
    if (!jsonMatch) throw new Error('Could not parse shot list from response. Try again.');

    let parsed = JSON.parse(jsonMatch[0]);

    if (!Array.isArray(parsed)) throw new Error('Expected an array of shots.');

    // Normalize shots
    shots = parsed.map((s, i) => ({
      shot_number: s.shot_number || i + 1,
      shot_type: s.shot_type || 'MS',
      action_description: s.action_description || '',
      camera_note: s.camera_note || '',
      frame_description: s.frame_description || '',
      image_url: null,
      image_loaded: false
    }));

    saveState();
    renderCards();
    loadImagesSequentially();
    toast(`Generated ${shots.length} shots! Images loading...`, 'success');

  } catch (err) {
    toast(`Error: ${err.message}`, 'error');
  } finally {
    generating = false;
    btn.disabled = false;
    btn.innerHTML = '&#9654; Generate Storyboard';
  }
}

/* ═══════ IMAGE LOADING (sequential) ═══════ */
async function loadImagesSequentially() {
  const suffix = 'cinematic storyboard pencil sketch black and white film grain';
  for (let i = 0; i < shots.length; i++) {
    if (shots[i].image_url) continue;
    const frameDesc = shots[i].frame_description || shots[i].action_description;
    const prompt = `${frameDesc}, ${suffix}`;
    const encoded = encodeURIComponent(prompt);
    const url = `https://image.pollinations.ai/prompt/${encoded}?width=640&height=360&nologo=true&seed=${Date.now() + i}`;

    shots[i].image_url = url;
    saveState();
    updateCardImage(i);

    // Wait for image to load before starting next
    try {
      await loadImage(url);
      shots[i].image_loaded = true;
      saveState();
      markImageLoaded(i);
    } catch(e) {
      // Image failed, move on to next
    }
  }
}

function loadImage(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = resolve;
    img.onerror = reject;
    img.src = url;
  });
}

/* ═══════ RENDER CARDS ═══════ */
function renderCards() {
  const canvas = document.getElementById('canvas');
  const label = document.getElementById('shot-count-label');

  if (shots.length === 0) {
    canvas.className = 'empty';
    canvas.innerHTML = `
      <div class="empty-icon">&#127902;</div>
      <p>Describe your scene, pick a style, and hit <strong>Generate Storyboard</strong> to create your cinematic shot list.</p>
    `;
    label.textContent = '';
    return;
  }

  canvas.className = '';
  label.textContent = `${shots.length} shot${shots.length !== 1 ? 's' : ''}`;

  canvas.innerHTML = shots.map((shot, i) => `
    <div class="shot-card" draggable="true" data-index="${i}"
         ondragstart="onDragStart(event, ${i})"
         ondragover="onDragOver(event)"
         ondragenter="onDragEnter(event)"
         ondragleave="onDragLeave(event)"
         ondrop="onDrop(event, ${i})"
         ondragend="onDragEnd(event)">
      <div class="shot-header">
        <span class="shot-badge">${String(shot.shot_number).padStart(2, '0')}</span>
        <span class="shot-type">${shot.shot_type}</span>
        <div class="shot-header-actions">
          <button title="Edit" onclick="openEditModal(${i})">&#9998;</button>
          <button title="Regenerate Image" onclick="regenerateImage(${i})">&#128260;</button>
          <button title="Duplicate" onclick="duplicateShot(${i})">&#10697;</button>
          <button title="Delete" class="del-btn" onclick="deleteShot(${i})">&#10005;</button>
        </div>
      </div>
      <div class="shot-image" onclick="openEditModal(${i})">
        ${shot.image_url
          ? `<img src="${shot.image_url}" class="${shot.image_loaded ? 'loaded' : ''}" onload="markImageLoaded(${i})" onerror="handleImageError(${i})" crossorigin="anonymous">`
          : ''}
        <div class="skeleton ${shot.image_url && shot.image_loaded ? 'hidden' : ''}">${shot.image_url ? 'Loading frame...' : 'No image'}</div>
      </div>
      <div class="shot-body">
        <p>${escapeHTML(shot.action_description)}</p>
        ${shot.camera_note ? `<div class="cam-note">${escapeHTML(shot.camera_note)}</div>` : ''}
      </div>
    </div>
  `).join('');
}

function updateCardImage(index) {
  const card = document.querySelector(`.shot-card[data-index="${index}"] .shot-image`);
  if (!card) return;
  const shot = shots[index];
  card.innerHTML = `
    <img src="${shot.image_url}" class="${shot.image_loaded ? 'loaded' : ''}" onload="markImageLoaded(${index})" onerror="handleImageError(${index})" crossorigin="anonymous">
    <div class="skeleton ${shot.image_loaded ? 'hidden' : ''}">Loading frame...</div>
  `;
}

function markImageLoaded(index) {
  const card = document.querySelector(`.shot-card[data-index="${index}"] .shot-image img`);
  if (card && !card.classList.contains('loaded')) {
    card.classList.add('loaded');
  }
  const skeleton = document.querySelector(`.shot-card[data-index="${index}"] .skeleton`);
  if (skeleton) skeleton.classList.add('hidden');
}

function handleImageError(index) {
  const skeleton = document.querySelector(`.shot-card[data-index="${index}"] .skeleton`);
  if (skeleton) {
    skeleton.textContent = 'Image failed to load';
    skeleton.classList.remove('hidden');
  }
}

/* ═══════ SHOT ACTIONS ═══════ */
function deleteShot(index) {
  shots.splice(index, 1);
  renumber();
  saveState();
  renderCards();
  if (shots.length > 0) loadImagesSequentially();
  toast('Shot deleted', 'info');
}

function duplicateShot(index) {
  const clone = { ...shots[index], shot_number: 0, image_url: null, image_loaded: false };
  shots.splice(index + 1, 0, clone);
  renumber();
  saveState();
  renderCards();
  loadImagesSequentially();
  toast('Shot duplicated', 'success');
}

function regenerateImage(index) {
  const shot = shots[index];
  const suffix = 'cinematic storyboard pencil sketch black and white film grain';
  const frameDesc = shot.frame_description || shot.action_description;
  const prompt = `${frameDesc}, ${suffix}`;
  const encoded = encodeURIComponent(prompt);
  const url = `https://image.pollinations.ai/prompt/${encoded}?width=640&height=360&nologo=true&seed=${Date.now()}`;
  shot.image_url = url;
  shot.image_loaded = false;
  saveState();
  updateCardImage(index);
  loadImage(url).then(() => {
    shot.image_loaded = true;
    saveState();
    markImageLoaded(index);
    toast('Image regenerated', 'success');
  }).catch(() => {
    toast('Image generation failed', 'error');
  });
}

/* ═══════ EDIT MODAL ═══════ */
function openEditModal(index) {
  editingIndex = index;
  const shot = shots[index];
  document.getElementById('edit-shot-id').textContent = `#${String(shot.shot_number).padStart(2, '0')}`;
  document.getElementById('edit-type').value = shot.shot_type;
  document.getElementById('edit-action').value = shot.action_description;
  document.getElementById('edit-camera').value = shot.camera_note;
  document.getElementById('edit-frame').value = shot.frame_description;
  document.getElementById('edit-modal').classList.add('open');
  document.getElementById('sidebar').classList.remove('open');
}

function closeEditModal() {
  document.getElementById('edit-modal').classList.remove('open');
  editingIndex = -1;
}

function saveEditModal() {
  if (editingIndex < 0) return;
  shots[editingIndex].shot_type = document.getElementById('edit-type').value;
  shots[editingIndex].action_description = document.getElementById('edit-action').value;
  shots[editingIndex].camera_note = document.getElementById('edit-camera').value;
  const newFrame = document.getElementById('edit-frame').value;
  if (newFrame !== shots[editingIndex].frame_description) {
    shots[editingIndex].frame_description = newFrame;
    shots[editingIndex].image_url = null;
    shots[editingIndex].image_loaded = false;
  }
  saveState();
  renderCards();
  loadImagesSequentially();
  closeEditModal();
  toast('Shot updated', 'success');
}

function regenerateFromModal() {
  if (editingIndex < 0) return;
  regenerateImage(editingIndex);
  closeEditModal();
}

/* ═══════ DRAG & DROP ═══════ */
function onDragStart(e, index) {
  dragSrcIndex = index;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', index);
  setTimeout(() => e.target.classList.add('dragging'), 0);
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
}

function onDragEnter(e) {
  e.preventDefault();
  const card = e.target.closest('.shot-card');
  if (card) card.classList.add('drag-over');
}

function onDragLeave(e) {
  const card = e.target.closest('.shot-card');
  if (card) card.classList.remove('drag-over');
}

function onDrop(e, targetIndex) {
  e.preventDefault();
  const card = e.target.closest('.shot-card');
  if (card) card.classList.remove('drag-over');

  if (dragSrcIndex === targetIndex || dragSrcIndex < 0) return;

  const [moved] = shots.splice(dragSrcIndex, 1);
  shots.splice(targetIndex, 0, moved);
  renumber();
  saveState();
  renderCards();
  toast('Shots reordered', 'info');
}

function onDragEnd(e) {
  e.target.classList.remove('dragging');
  document.querySelectorAll('.shot-card').forEach(c => c.classList.remove('drag-over'));
  dragSrcIndex = -1;
}

function renumber() {
  shots.forEach((s, i) => { s.shot_number = i + 1; });
}

/* ═══════ CLEAR ═══════ */
function clearAll() {
  if (shots.length === 0) return;
  shots = [];
  saveState();
  renderCards();
  toast('Storyboard cleared', 'info');
}

/* ═══════ EXPORT ═══════ */
function toggleExportMenu() {
  document.getElementById('export-menu').classList.toggle('open');
}

async function exportPNG() {
  document.getElementById('export-menu').classList.remove('open');
  if (shots.length === 0) { toast('Nothing to export.', 'error'); return; }
  toast('Generating PNG...', 'info');
  try {
    const canvas = document.getElementById('canvas');
    const c = await html2canvas(canvas, {
      backgroundColor: '#0A0A0C',
      scale: 2,
      useCORS: true,
      allowTaint: true,
    });
    const link = document.createElement('a');
    link.download = 'storyboard.png';
    link.href = c.toDataURL('image/png');
    link.click();
    toast('PNG saved!', 'success');
  } catch(e) {
    toast('PNG export failed.', 'error');
  }
}

async function exportPDF() {
  document.getElementById('export-menu').classList.remove('open');
  if (shots.length === 0) { toast('Nothing to export.', 'error'); return; }
  toast('Generating PDF...', 'info');
  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });

    // Title page
    doc.setFillColor(10, 10, 12);
    doc.rect(0, 0, 297, 210, 'F');
    doc.setTextColor(232, 197, 71);
    doc.setFontSize(28);
    doc.text('Storyboard AI', 148.5, 85, { align: 'center' });
    doc.setTextColor(240, 237, 232);
    doc.setFontSize(12);
    doc.text(`${shots.length} Shots  |  ${currentStyle} Style`, 148.5, 100, { align: 'center' });
    doc.setTextColor(138, 138, 142);
    doc.setFontSize(10);
    doc.text(new Date().toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' }), 148.5, 112, { align: 'center' });

    // Shot pages
    for (let i = 0; i < shots.length; i++) {
      doc.addPage();
      doc.setFillColor(10, 10, 12);
      doc.rect(0, 0, 297, 210, 'F');

      // Header
      doc.setTextColor(232, 197, 71);
      doc.setFontSize(14);
      doc.text(`Shot ${String(shots[i].shot_number).padStart(2, '0')}  |  ${shots[i].shot_type}`, 15, 18);

      // Image area placeholder
      doc.setDrawColor(42, 42, 46);
      doc.roundedRect(15, 25, 165, 93, 3, 3, 'S');
      if (shots[i].image_url) {
        try {
          doc.addImage(shots[i].image_url, 'JPEG', 15, 25, 165, 93);
        } catch(e) {}
      }

      // Text content
      const x = 190;
      doc.setTextColor(240, 237, 232);
      doc.setFontSize(11);
      const actionLines = doc.splitTextToSize(shots[i].action_description, 95);
      doc.text(actionLines, x, 35);

      if (shots[i].camera_note) {
        doc.setTextColor(184, 152, 46);
        doc.setFontSize(10);
        const camLines = doc.splitTextToSize(shots[i].camera_note, 95);
        doc.text(camLines, x, 35 + actionLines.length * 6 + 6);
      }

      if (shots[i].frame_description) {
        doc.setTextColor(138, 138, 142);
        doc.setFontSize(9);
        const frameLines = doc.splitTextToSize(shots[i].frame_description, 95);
        doc.text(frameLines, x, 35 + actionLines.length * 6 + 20);
      }

      // Footer
      doc.setTextColor(90, 90, 94);
      doc.setFontSize(8);
      doc.text(`${i + 1} / ${shots.length}`, 148.5, 203, { align: 'center' });
    }

    doc.save('storyboard.pdf');
    toast('PDF saved!', 'success');
  } catch(e) {
    toast('PDF export failed.', 'error');
  }
}

function exportCSV() {
  document.getElementById('export-menu').classList.remove('open');
  if (shots.length === 0) { toast('Nothing to export.', 'error'); return; }
  const headers = ['Shot #', 'Type', 'Action Description', 'Camera Note', 'Frame Description'];
  const rows = shots.map(s => [
    s.shot_number,
    s.shot_type,
    `"${(s.action_description || '').replace(/"/g, '""')}"`,
    `"${(s.camera_note || '').replace(/"/g, '""')}"`,
    `"${(s.frame_description || '').replace(/"/g, '""')}"`
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'storyboard.csv';
  link.click();
  toast('CSV saved!', 'success');
}

/* ═══════ UTILS ═══════ */
function escapeHTML(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
